<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="ui.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>Sign Up</title>
</head>

<body>
    <div class="container">
        <h1 id="title">Sign Up</h1>
        <div class="box">
            <p><input type="text" name="email" value="Enter your Email..."></p>
            <p><input type="text" name="password" value="Enter your Password..."></p>
        </div>
        <p class="sign">Sign up with a social account</p>
        <div class="icons">
            <i class='bx bxl-google'></i>
            <i class='bx bxl-linkedin'></i>
            <i class='bx bxl-facebook'></i>
        </div>
        <div class="sign-in">
            <button>Sign In</button>
        </div>
    </div>
</body>

</html>
